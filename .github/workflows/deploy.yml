name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/warenwirtschaft
  APP_DIR: /opt/apps/warenwirtschaft
  HEALTH_URL: https://warenwirtschaft.kassen-buch.cloud/login
  NEXT_PUBLIC_SUPABASE_URL: https://supabase.kassen-buch.cloud
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc2NzEwOTE0LCJleHAiOjE5MzQzOTA5MTR9.RA2qT5d5beJcrWXBFCHl1cwD5uLrNNmJGUK0Z8rEERg

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive lowercase image name + tag
        id: meta
        run: |
          echo "image_lc=$(echo '${{ env.IMAGE }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_lc }}:latest
            ${{ steps.meta.outputs.image_lc }}:${{ steps.meta.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make image public
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X PATCH "/user/packages/container/warenwirtschaft/visibility" -f visibility=public || true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Hartes Cap: wenn ssh/scp hängt, bricht der Job spätestens hier ab.
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: docker-compose.prod.yml
          sparse-checkout-cone-mode: false

      # Native SSH-Key + known_hosts statt appleboy-action — die hängt sporadisch.
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 -T 10 ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync compose file to VPS
        timeout-minutes: 2
        run: |
          scp -i ~/.ssh/id_ed25519 \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=10 \
              -o ServerAliveCountMax=3 \
              docker-compose.prod.yml \
              root@${{ secrets.VPS_HOST }}:${{ env.APP_DIR }}/docker-compose.yml

      - name: Pull new image + recreate container
        timeout-minutes: 5
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=10 \
              -o ServerAliveCountMax=3 \
              root@${{ secrets.VPS_HOST }} bash -se <<'EOSSH'
            set -euo pipefail
            cd /opt/apps/warenwirtschaft
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          EOSSH

      - name: Health check
        run: |
          for i in $(seq 1 18); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "${{ env.HEALTH_URL }}" || echo "000")
            if [ "$code" = "200" ]; then
              echo "Live nach $i Versuchen ($((i*5))s) — HTTP $code"
              exit 0
            fi
            echo "  warte auf ${{ env.HEALTH_URL }} (${i}/18) — letzter HTTP=$code"
            sleep 5
          done
          echo "Health check failed nach 90s — letzter HTTP=$code"
          exit 1
