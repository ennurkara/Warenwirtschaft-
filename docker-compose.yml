services:
  warenwirtschaft:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: https://supabase.kassen-buch.cloud
        NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzc2NzEwOTE0LCJleHAiOjE5MzQzOTA5MTR9.RA2qT5d5beJcrWXBFCHl1cwD5uLrNNmJGUK0Z8rEERg
    container_name: warenwirtschaft
    restart: unless-stopped
    env_file:
      - .env.local
    networks:
      - n8n_web
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_web
      - traefik.http.routers.warenwirtschaft.rule=Host(`warenwirtschaft.kassen-buch.cloud`)
      - traefik.http.routers.warenwirtschaft.entrypoints=websecure
      - traefik.http.routers.warenwirtschaft.tls=true
      - traefik.http.routers.warenwirtschaft.tls.certresolver=letsencrypt
      - traefik.http.services.warenwirtschaft.loadbalancer.server.port=3000
      - traefik.http.routers.warenwirtschaft-http.rule=Host(`warenwirtschaft.kassen-buch.cloud`)
      - traefik.http.routers.warenwirtschaft-http.entrypoints=web
      - traefik.http.routers.warenwirtschaft-http.middlewares=warenwirtschaft-redirect
      - traefik.http.middlewares.warenwirtschaft-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.warenwirtschaft-redirect.redirectscheme.permanent=true

networks:
  n8n_web:
    external: true
